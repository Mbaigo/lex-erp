server:
  port: 9000

spring:
  application:
    name: api-gateway

  # 1. Configuration de la sécurité OAuth2
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/lex-couture
        registration:
          keycloak:
            client-id: frontend-client # Celui configuré dans Keycloak
            client-secret:  # Si ton client est "confidential"
            scope: openid, profile, email

  cloud:
    gateway:
      # 2. Filtre par défaut pour toutes les routes
      default-filters:
        - TokenRelay # Transmet automatiquement le header 'Authorization: Bearer ...' aux microservices

      # 3. Vos routes adaptées
      routes:
        # Route vers le Order Service (Port 8084)
        - id: order_service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/commandes/**

        # Route vers le Catalog Service (Port 8085)
        - id: catalog_inventories_service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/articles/**,/api/v1/categories/**,/api/v1/modeles/**

        # Route vers le Customer Service (Port 8083)
        - id: customer-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/clients/**,/api/v1/fiches-mesures/**

      # 4. CONFIGURATION CORS (Mise à jour pour autoriser l'Authorization header)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true # Important pour certains échanges OAuth2