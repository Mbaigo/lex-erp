server:
  port: 9000

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      # CHANGEMENT : On configure le Gateway comme Resource Server pour valider les tokens
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/lex-couture
          # Optionnel : si Keycloak est lent, ajoute l'URI directe des clés
          # jwk-set-uri: http://localhost:9090/realms/lex-couture/protocol/openid-connect/certs

  cloud:
    gateway:
      default-filters:
        - TokenRelay # Transmet le jeton aux microservices (Order, Catalog, etc.)

      routes:
        - id: order_service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/commandes/**

        - id: catalog_inventories_service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/articles/**,/api/v1/categories/**,/api/v1/modeles/**

        - id: customer-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/clients/**,/api/v1/fiches-mesures/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173" # Ton port Vite
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            # On expose certains headers si ton frontend en a besoin (ex: pagination)
            exposedHeaders: "Content-Disposition, Authorization"